# =============================================================================
# harness_registry.yaml — Declarative registry of all checks, harnesses, and
#                          scheduled tasks. Add new capabilities here without
#                          editing any scripts.
#
# The scheduler reads this file and runs items based on their schedule,
# window (online/offline), and conditions.
# =============================================================================

# --- Monitor checks (run by registry_engine.py) ---
# These run every 15 minutes during their specified window.
# Each check produces alerts when thresholds are crossed.
checks:
  disk_usage:
    enabled: true
    command: "df / | awk 'NR==2 {gsub(/%/,\"\"); print $5}'"
    type: threshold  # threshold, command_exit, regex_match, http_probe
    warn: 80
    critical: 90
    unit: "%"
    message: "Disk usage at {value}%"
    runbook: disk-pressure

  swap_usage:
    enabled: true
    command: "free -m | awk '/Swap/ {print $3}'"
    type: threshold
    warn: 500
    critical: 2000
    unit: "MB"
    message: "Swap at {value}MB — possible memory pressure"

  ram_usage:
    enabled: true
    command: "free | awk '/Mem/ {printf \"%.0f\", $3/$2*100}'"
    type: threshold
    warn: 85
    critical: 95
    unit: "%"
    message: "RAM at {value}%"

  cpu_temperature:
    enabled: true
    command: "sensors 2>/dev/null | grep -oP '\\+\\K[0-9]+(?=\\.[0-9]+°C)' | sort -rn | head -1 || echo 0"
    type: threshold
    warn: 80
    critical: 90
    unit: "°C"
    message: "CPU temperature at {value}°C"
    requires: sensors

  llm_server:
    enabled: true
    command: "curl -sf --max-time 5 http://localhost:8080/health"
    type: http_probe
    url: "http://localhost:8080/health"
    message: "Primary LLM server not responding"
    priority: 1
    runbook: llm-server-offline
    restart_cmd: "sudo systemctl restart agentharness-llm-proxy"

  # --- Docker container checks ---
  # These are auto-generated from running containers but you can add specific ones:
  docker_unhealthy:
    enabled: true
    command: "docker ps --filter 'health=unhealthy' --format '{{.Names}}' | head -5"
    type: command_output  # alert if output is non-empty
    message: "Unhealthy containers: {value}"

  docker_crashed:
    enabled: true
    command: "docker ps -a --filter 'status=exited' --format '{{.Names}} {{.Status}}' | grep -v 'Exited (0)' | head -5"
    type: command_output
    message: "Crashed containers: {value}"
    runbook: container-crashed

  llm_local:
    enabled: true
    command: "curl -sf --max-time 5 http://localhost:8081/health"
    type: http_probe
    url: "http://localhost:8081/health"
    message: "Local LLM engine not responding"
    priority: 1
    runbook: llm-server-offline
    restart_cmd: "sudo systemctl restart llama-primary"

  chaguli_container:
    enabled: true
    command: "docker inspect chaguli --format '{{.State.Status}}' 2>/dev/null | grep -q running"
    type: command_exit
    message: "Chaguli agent container is not running"
    priority: 4
    runbook: chaguli-down
    restart_cmd: "docker restart chaguli"

  backup_freshness:
    enabled: true
    command: "find /mnt/usb -name '*.tar.gz' -o -name '*.sql' -mtime -2 2>/dev/null | head -1 | grep -q ."
    type: command_exit
    message: "No recent backups found on USB drive"
    runbook: backup-stale

  disk_trend:
    enabled: true
    command: "python3 scripts/disk_trend.py"
    type: command_exit
    message: "Disk growth trend check"

  network_health:
    enabled: true
    command: "ping -c1 -W3 8.8.8.8 >/dev/null 2>&1"
    type: command_exit
    message: "Network connectivity lost — cannot reach internet"
    priority: 1
    runbook: network-down

  filesystem_writable:
    enabled: true
    command: "touch ${AH_DATA_DIR:-/home/rohit/agentharness/data}/.write_test && rm -f ${AH_DATA_DIR:-/home/rohit/agentharness/data}/.write_test"
    type: command_exit
    message: "Filesystem is read-only — data directory not writable"
    priority: 1

  time_drift:
    enabled: true
    command: "bash scripts/check_time_drift.sh"
    type: command_exit
    message: "System clock drift detected — NTP may be broken"


  hermes_gateway:
    enabled: true
    command: "systemctl --user is-active hermes-gateway"
    type: command_exit
    message: "Hermes gateway (Telegram) is not running"
    priority: 3
    runbook: hermes-gateway-down
    restart_cmd: "systemctl --user restart hermes-gateway"

  mcp_gateway_health:
    enabled: true
    command: "curl -sf --max-time 5 http://localhost:8090/health"
    type: http_probe
    url: "http://localhost:8090/health"
    message: "MCP gateway not responding"
    priority: 2
    restart_cmd: "docker restart mcp-gateway"

  # --- Add your custom checks below ---
  # Example: Monitor Jellyfin transcoding queue
  # jellyfin_transcode:
  #   enabled: true
  #   command: "curl -sf http://localhost:8096/Sessions | python3 -c \"import sys,json; sessions=json.load(sys.stdin); active=[s for s in sessions if s.get('TranscodingInfo')]; print(len(active))\""
  #   type: threshold
  #   warn: 3
  #   critical: 5
  #   unit: "active transcodes"
  #   message: "Jellyfin has {value} active transcodes"

  # Example: Check if Pi-hole is blocking
  # pihole_blocking:
  #   enabled: true
  #   command: "curl -sf http://localhost/admin/api.php?status | python3 -c \"import sys,json; print(json.load(sys.stdin).get('status','unknown'))\""
  #   type: regex_match
  #   expected: "enabled"
  #   message: "Pi-hole blocking is disabled!"


# --- Harnesses (scheduled tasks) ---
# These run on a schedule during the specified window.
harnesses:
  # NOTE: daily analysis, memory, self-improvement, briefings, and monitoring
  # are handled by Chaguli's own Python modules (self_improve.py, memory.py,
  # briefings.py, heartbeat.py). AgentHarness only handles infrastructure.

  weekly_optimize:
    enabled: true
    script: "weekly_optimize.sh"
    window: online
    frequency: weekly
    description: "Search for new models, tools, techniques"

  cleanup:
    enabled: true
    script: "cleanup.sh"
    window: offline
    frequency: "3d"      # every 3 days
    description: "Clean up Docker, packages, logs, temp files"

  benchmark:
    enabled: true
    script: "benchmark.sh"
    window: offline
    frequency: weekly
    description: "Re-benchmark all model x engine combos"

  backup:
    enabled: true
    script: "backup.sh"
    window: offline
    frequency: daily
    description: "Backup configs and state to USB drive"

  security_audit:
    enabled: true
    script: "security_audit.sh"
    window: offline
    frequency: weekly
    description: "Security boundary checks"

  # memory, service_registry, openclaw_sync, morning_briefing removed
  # — handled by Chaguli's memory.py, heartbeat.py, briefings.py

  trend_projections:
    enabled: true
    script: "trend_projector.sh"
    window: offline
    frequency: "6h"
    description: "Sample metrics and project when thresholds will be hit"

  update_watcher:
    enabled: true
    script: "update_watcher.sh"
    window: online
    frequency: weekly
    description: "Check for container image updates"

  mcp_gateway:
    enabled: true
    script: "mcp_gateway.sh"
    window: offline
    frequency: "6h"
    description: "Discover MCP servers and generate bridge skills"

  daily_digest:
    enabled: true
    script: "send_daily_digest.sh"
    window: online
    frequency: daily
    time_window: "07:00-08:00"
    description: "Send daily doctor activity digest to Chaguli"

  # --- Add your custom harnesses below ---
  # Example: Check for Immich face recognition updates
  # immich_faces:
  #   enabled: true
  #   script: "custom/check_immich_faces.sh"
  #   window: offline
  #   frequency: daily
  #   description: "Check Immich face recognition job status"


# --- Custom scripts directory ---
# Drop scripts in the custom/ directory and reference them above.
# They'll have access to all discovered paths and configs via:
#   source scripts/common.sh  (provides AH_* variables)
custom_scripts_dir: "auto"
