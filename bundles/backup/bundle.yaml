tools:
  run_backup:
    approval: approve
    execution: direct
    description: "Backup configs and state to USB drive"

harnesses:
  backup:
    enabled: true
    script: "backup.sh"
    window: offline
    frequency: daily
    description: "Backup configs and state to USB drive"
