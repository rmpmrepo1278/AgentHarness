services:
  backup-mcp:
    build: ./backup-mcp
    container_name: backup-mcp
    depends_on:
    - mcp-gateway
    deploy: &id001
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M
    environment:
    - MCP_PORT=8102
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    - DOCKER_HOST=tcp://192.168.29.10:2375
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
    - /mnt/usb/backups:/backups
  docker-mcp:
    build: ./docker-mcp
    container_name: docker-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8095
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    - DOCKER_HOST=tcp://192.168.29.10:2375
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./templates/docker:/templates/repo:ro
    - ~/mcp-gateway/templates:/templates/local
    - ~/mcp-gateway/secrets:/secrets
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
    - mcp-stacks:/data/stacks
  doctor-mcp:
    build: ./doctor-mcp
    container_name: doctor-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8105
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    - DOCTOR_BASE_URL=http://127.0.0.1:8080/doctor
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
  file-mcp:
    build: ./file-mcp
    container_name: file-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8097
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    network_mode: host
    restart: unless-stopped
    volumes:
    - /mnt/usb:/mnt/usb:rw
    - /home/rohit/openclaw/data:/home/rohit/openclaw/data:rw
    - /opt:/opt:rw
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
  git-mcp:
    build: ./git-mcp
    container_name: git-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8100
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    - GITEA_URL=http://127.0.0.1:3001
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
  global-chat-mcp:
    build: ./global-chat-mcp
    container_name: global-chat-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8106
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
  mcp-gateway:
    build: ./mcp-gateway
    container_name: mcp-gateway
    deploy: *id001
    environment:
    - GATEWAY_PORT=8090
    - HEALTH_CHECK_INTERVAL=60
    - CHAGULI_ALERTS_DIR=/data/alerts
    - GATEWAY_STATE_FILE=/data/gateway_state.json
    - GATEWAY_LOG_FILE=/data/gateway.log
    - DOCKER_HOST=tcp://192.168.29.10:2375
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./mcp-gateway/data:/data
    - ./templates/docker:/templates/repo:ro
    - ~/mcp-gateway/templates:/templates/local
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
  mnemo-mcp:
    build: ./mnemo-mcp
    container_name: mnemo-mcp
    depends_on:
    - mnemo-server
    deploy: *id001
    environment:
    - PUBLIC_URL=http://0.0.0.0:8096
    - MCP_PORT=8096
    - MNEMO_SERVER_URL=http://127.0.0.1:8001
    - MCP_DCR_SERVER_SECRET=test-secret
    - GATEWAY_URL=http://127.0.0.1:8090
    network_mode: host
    restart: unless-stopped
    volumes:
    - mnemo-data:/app/data
    - ./hf_cache:/app/hf_cache
  mnemo-postgres:
    container_name: mnemo-postgres
    deploy: *id001
    environment:
    - POSTGRES_DB=mnemo
    - POSTGRES_PASSWORD=hermes_memory_secret
    image: pgvector/pgvector:pg16
    network_mode: host
    restart: unless-stopped
    volumes:
    - /home/rohit/.hermes/data/pg_data:/var/lib/postgresql/data
  mnemo-server:
    command: uv run uvicorn mnemo.server.main:app --host 0.0.0.0 --port 8001
    container_name: mnemo-server
    depends_on:
    - mnemo-postgres
    deploy: *id001
    environment:
    - MNEMO_DATABASE_URL=postgresql://postgres:hermes_memory_secret@127.0.0.1:5432/mnemo
    - PORT=8001
    - HF_HOME=/app/hf_cache
    - MNEMO_EMBEDDING_MODEL=/app/hf_cache/models--sentence-transformers--all-MiniLM-L6-v2/snapshots/c9745ed1d9f207416be6d2e6f8de32d1f16199bf
    - TRANSFORMERS_OFFLINE=1
    image: mnemo-server:latest
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./hf_cache:/app/hf_cache
    - mnemo-data:/app/data
  n8n-mcp:
    build: ./n8n-mcp
    container_name: n8n-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8098
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    - N8N_URL=http://127.0.0.1:5678
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
    - /home/rohit/openclaw/data/provider_keys.env:/data/.env:ro
  network-mcp:
    build: ./network-mcp
    container_name: network-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8103
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    - HOST_IP=192.168.29.10
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
  paperless-mcp:
    build: ./paperless-mcp
    container_name: paperless-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8099
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    - PAPERLESS_URL=http://127.0.0.1:8000
    - CONSUME_DIR=/consume
    network_mode: host
    restart: unless-stopped
    volumes:
    - /home/rohit/openclaw/data/paperless/consume:/consume:rw
    - /mnt/usb:/mnt/usb:ro
    - /home/rohit/openclaw/data:/home/rohit/openclaw/data:ro
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
  rss-mcp:
    build: ./rss-mcp
    container_name: rss-mcp
    depends_on:
    - mcp-gateway
    deploy: *id001
    environment:
    - MCP_PORT=8104
    - GATEWAY_URL=http://127.0.0.1:8090
    - MCP_BASE_DIR=/mcp-base
    network_mode: host
    restart: unless-stopped
    volumes:
    - ./mcp-gateway/mcp_base.py:/mcp-base/mcp_base.py:ro
    - rss-data:/data
version: '3.8'
volumes:
  mcp-stacks: {}
  mnemo-data: {}
  rss-data: {}
