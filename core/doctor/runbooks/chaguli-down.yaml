name: chaguli-down
version: 1
trigger: "health_check_fail:chaguli_container"
priority: critical
notify: critical
description: >
  Recover the Chaguli agent (now running as a host service).
  Since Chaguli IS the notification system, this runbook sends 
  alerts directly via Telegram API on failure.

steps:
  - name: check-chaguli-state
    check: "systemctl --user is-active chaguli"
    expect_contains: "active"
    on_fail:
      - name: restart-chaguli
        fix: "systemctl --user restart chaguli"
        wait: 10
      - name: verify-chaguli-running
        check: "systemctl --user is-active chaguli"
        expect_contains: "active"
        on_fail:
          - name: read-chaguli-logs
            check: "journalctl --user -u chaguli --no-pager -n 50"
            interpret: llm
            on_unknown:
              escalate: true

  - name: notify-telegram-direct
    check: "systemctl --user is-active chaguli"
    expect_contains: "active"
    on_fail:
      - fix: >
          curl -sf -X POST
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
          -d chat_id="${TELEGRAM_CHAT_ID}"
          -d parse_mode=Markdown
          -d text="*AgentHarness Doctor*: Chaguli service is DOWN and could not be auto-recovered. Manual intervention required."
        wait: 2
      - escalate: "Chaguli is down and could not be restarted. Direct Telegram alert sent."
