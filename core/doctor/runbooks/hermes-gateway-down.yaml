name: hermes-gateway-down
version: 2
trigger: "health_check_fail:hermes_gateway"
priority: critical
notify: critical
description: >
  Diagnose and recover the Hermes AI Agent Gateway.
  Hermes runs as a systemd service (hermes-gateway) using long polling for Telegram.
  Health is verified via the systemd service status and Telegram connectivity.

steps:
  - name: check-hermes-service
    check: "systemctl is-active hermes-gateway"
    expect_contains: "active"
    on_fail:
      - name: restart-hermes-gateway
        fix: "sudo systemctl restart hermes-gateway"
        wait: 5
      - name: verify-hermes-after-restart
        check: "systemctl is-active hermes-gateway"
        expect_contains: "active"
        on_fail:
          - escalate: "Hermes gateway service failed to restart. Check systemd logs."

  - name: check-telegram-connectivity
    check: "curl -sf http://localhost:8080/health"
    expect_contains: "ok"
    on_fail:
      - escalate: "LLM proxy not responding. Gateway cannot function."

  - name: verify-hermes-process
    check: "pgrep -f 'hermes_cli.main gateway run'"
    expect_regex: "^[0-9]+"
    on_fail:
      - escalate: "Hermes gateway process not found despite service being active."
